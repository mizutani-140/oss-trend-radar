name: Shiki Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Shiki mirror
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Shiki artifacts
        run: python3 scripts/validate_shiki.py

      - name: Compile Shiki CLI
        run: python3 -m py_compile scripts/shiki.py

      - name: Run Shiki init contract test
        run: bash scripts/test_shiki_init.sh

      - name: Run Shiki control-plane contract test
        run: bash scripts/test_shiki_control_plane.sh

      - name: Run Shiki run orchestrator contract test
        run: bash scripts/test_shiki_run_orchestrator.sh

      - name: Run Shiki daemon and runner contract test
        run: bash scripts/test_shiki_daemon_runner.sh

      - name: Run Shiki one-command start contract test
        run: bash scripts/test_shiki_start.sh
