name: OSS Trend Radar Daily Report

# Generates a daily trending-OSS report and persists it to the protected-free
# `reports` branch. main stays clean; this never commits to main.
on:
  schedule:
    - cron: "23 21 * * *" # daily at 21:23 UTC
  workflow_dispatch:
    inputs:
      top:
        description: "Number of repositories to include"
        required: false
        default: "25"

permissions:
  contents: write

concurrency:
  group: ossradar-daily-report
  cancel-in-progress: false

jobs:
  report:
    name: Generate and publish daily report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ossradar
        run: python -m pip install --quiet -e .

      - name: Generate report
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python -m ossradar report --top "${{ github.event.inputs.top || '25' }}"

      - name: Publish reports/ to the reports branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          day="$(date -u +%Y-%m-%d)"

          # Stash freshly generated artifacts; the whole reports/ tree is carried
          # so future slices (e.g. JSON snapshots) are committed without changes here.
          tmp="$(mktemp -d)"
          cp -a reports/. "$tmp/"

          # Drop the freshly generated (untracked) files so switching to the
          # reports branch never aborts on "untracked files would be overwritten"
          # (happens on same-day re-runs and once reports/data/ snapshots exist).
          git clean -fd reports

          # Move onto the reports branch (create it on first run).
          git fetch origin reports || true
          if git rev-parse --verify --quiet origin/reports; then
            git switch -C reports origin/reports
          else
            git switch --orphan reports
          fi

          # Restore the generated artifacts over whatever the branch had.
          mkdir -p reports
          cp -a "$tmp/." reports/
          git add reports

          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "ossradar: daily report ${day}"
            git push origin reports
          fi
