name: Tests

# Durable CI evidence that the ossradar unit tests pass on every PR and on main.
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ossradar (with dev deps)
        run: python -m pip install --quiet -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q
